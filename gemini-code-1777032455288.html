<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COSMOSO</title>
<style>
  body {
    background: #ffffff;
    color: #000000;
    font-family: Times New Roman, Times, serif;
    font-size: 16px;
    margin: 0;
    padding: 0;
    position: relative;
    overflow-x: hidden;
  }
  a { color: #0000cc; }
  a:visited { color: #551a8b; }
  a:hover { color: #cc0000; }

  /* ── epic viewer ── */
  #epic-viewer { width: 100%; }
  #epic-img-wrap {
    width: 100%;
    aspect-ratio: 1;
    background: #000000;
    border: 1px solid #333333;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    max-height: 210px;
  }
  #epic-img { width: 100%; height: 100%; object-fit: cover; display: block; }
  #epic-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-top: 5px;
  }
  .epic-btn {
    font-family: Arial, sans-serif;
    font-size: 11px;
    padding: 2px 7px;
    background: #000080;
    color: #ffffff;
    border: 1px outset #8888cc;
    cursor: pointer;
    line-height: 1.4;
  }
  .epic-btn:hover { background: #0000aa; }
  .epic-btn.playing { background: #880000; border-color: #cc8888; }

  /* ── top bar ── */
  #topbar {
    background: #000080;
    color: #ffffff;
    text-align: center;
    padding: 6px 0;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    position: relative;
    z-index: 10;
  }

  /* ── main layout ── */
  #outer {
    width: 760px;
    margin: 0 auto;
    padding: 10px 0 40px;
    position: relative;
    z-index: 5;
  }

  /* ── site title ── */
  #sitetitle {
    text-align: center;
    border-bottom: 2px solid #000000;
    padding-bottom: 10px;
    margin-bottom: 6px;
  }
  #sitetitle h1 {
    font-family: Times New Roman, serif;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 8px;
    margin: 10px 0 2px;
  }
  #sitetitle .tagline { font-size: 13px; font-style: italic; color: #444444; }

  /* ── nav ── */
  #nav {
    text-align: center;
    border-bottom: 1px solid #000000;
    padding: 6px 0;
    margin-bottom: 16px;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
  }
  #nav a { margin: 0 12px; text-decoration: none; color: #000080; font-weight: bold; }
  #nav a:hover { text-decoration: underline; color: #cc0000; }
  #nav a.active { color: #cc0000; text-decoration: underline; }

  /* ── pages ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── home layout ── */
  #home-layout { display: table; width: 100%; border-collapse: collapse; }
  #home-main {
    display: table-cell; width: 490px; vertical-align: top;
    padding-right: 20px; border-right: 1px solid #cccccc;
  }
  #home-sidebar { display: table-cell; width: 230px; vertical-align: top; padding-left: 18px; }

  .section-head {
    font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: bold;
    letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #000000;
    padding-bottom: 3px; margin-bottom: 10px; color: #000000;
  }

  /* intro */
  #intro-box { border: 1px solid #000080; padding: 14px 16px; margin-bottom: 18px; background: #f0f0ff; }
  #intro-box p { margin: 0 0 8px; line-height: 1.7; font-size: 15px; }
  #intro-box p:last-child { margin-bottom: 0; }

  /* bellissima */
  #bellissima-box { border: 2px solid #000000; margin-bottom: 18px; background: #fffff0; }
  #bellissima-head {
    background: #000000; color: #ffffff; font-family: Times New Roman, serif;
    font-size: 15px; font-style: italic; font-weight: bold; padding: 6px 12px; letter-spacing: 1px;
  }
  #bellissima-head a { color: #aaaaff; font-size: 11px; font-style: normal; font-weight: normal; margin-left: 10px; }
  #bellissima-head a:hover { color: #ffaaaa; }
  #bellissima-body { padding: 14px 16px; }
  #bellissima-img-wrap { float: right; margin: 0 0 10px 18px; max-width: 196px; text-align: center; position: relative; }
  #bellissima-img-inner { position: relative; display: inline-block; padding: 10px; background: #fffff0; }
  #bellissima-img-inner::before { content: ''; position: absolute; inset: 0; border: 2px solid #888866; pointer-events: none; }
  #bellissima-img-inner::after {
    content: '❧'; position: absolute; bottom: -11px; left: 50%; transform: translateX(-50%);
    font-size: 18px; color: #888866; background: #fffff0; padding: 0 4px; line-height: 1;
  }
  .bella-corner { position: absolute; font-size: 15px; color: #888866; line-height: 1; background: #fffff0; padding: 0 1px; }
  .bella-corner.tl { top: -9px; left
