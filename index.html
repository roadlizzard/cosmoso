<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ✅ allow scrolling */
html,body{height:auto;overflow-x:hidden;}

/* retro base */
body{
  background:#f4f1e8;
  color:#000;
  font-family:"Times New Roman",Times,serif;
  font-size:17px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* classic links */
a{color:#0000EE;text-decoration:underline;}
a:visited{color:#551A8B;}
a:hover{color:#FF0000;}

/* top */
#topbar{
  background:#000080;
  color:#fff;
  font-family:Arial,sans-serif;
  font-size:12px;
  letter-spacing:1.5px;
  text-align:center;
  padding:6px 0;
}

/* title */
#sitetitle{
  text-align:center;
  background:#fff;
  border-bottom:2px solid #000;
  padding:10px 0;
}
#sitetitle h1{font-size:36px;letter-spacing:8px;}
#sitetitle .tagline{font-size:13px;color:#555;}

/* nav */
#nav{
  background:#eaeaea;
  border-top:1px solid #000;
  border-bottom:2px solid #000;
  text-align:center;
  font-family:Arial,sans-serif;
  font-size:12px;
  padding:6px 0;
}
#nav a{
  padding:4px 10px;
  border-right:1px solid #999;
  text-decoration:none;
  color:#000080;
  font-weight:bold;
}
#nav a:last-child{border-right:none;}
#nav a:hover{color:#cc0000;text-decoration:underline;}

/* layout */
#shell{min-height:calc(100vh - 114px);}
.page{display:none;}
.page.active{display:flex;flex-direction:column;}

.page.scrollable.active{
  padding:20px;
  max-width:900px;
  margin:0 auto;
}

/* home grid */
#home-dashboard{
  display:grid;
  grid-template-columns:1fr 290px;
  gap:12px;
  background:#fff;
}

/* main column */
#home-main{
  display:grid;
  grid-template-rows:auto auto auto 1fr;
  border-right:1px solid #ccc;
  gap:6px;
}

/* panels */
#intro-strip,
#latest-strip,
#bella-strip,
.sb-sec,
.arc-card,
.nas-card,
.adm-form{
  border:1px solid #000;
  background:#fffef8;
  box-shadow:2px 2px 0 #ccc;
  padding:10px 12px;
  margin-bottom:10px;
}

/* headers */
.sb-head,
.section-head{
  background:#000080;
  color:#fff;
  border:1px solid #000;
  padding:4px 6px;
  font-family:Arial,sans-serif;
  font-size:11px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:10px;
}

/* text scaling */
#intro-text{font-size:15px;}
#latest-title{font-size:18px;font-weight:bold;}
#latest-snip{font-size:13px;color:#666;}
#bella-title-d{font-size:16px;font-weight:bold;}
#bella-text-d{font-size:14px;}

/* blog */
.blog-post{
  margin-bottom:28px;
  padding-bottom:18px;
  border-bottom:1px solid #bbb;
}

.post-title{
  font-size:24px;
  margin-bottom:10px;
}

.post-body{
  font-size:17px;
}

.post-body p{margin-bottom:10px;}

/* sidebar */
#home-sidebar{
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* images */
img{
  max-width:100%;
  display:block;
  border:1px solid #000;
}

/* lightbox */
#lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  z-index:999;
  align-items:center;
  justify-content:center;
}
#lightbox.open{display:flex;}
#lightbox img,#lightbox video{
  max-width:90vw;
  max-height:88vh;
  border:2px solid #fff;
}
</style>
</head>

<body>

<div id="lightbox" onclick="closeLB()">
  <img id="lb-img"/>
  <video id="lb-vid" controls style="display:none;"></video>
</div>

<div id="topbar">KOSMOSO · A PERSONAL RECORD OF THE UNIVERSE</div>

<div id="sitetitle">
  <h1>KOSMOSO</h1>
  <div class="tagline">a personal record of the universe</div>
</div>

<div id="nav">
  <a href="#" onclick="showPage('home')">HOME</a>
  <a href="#" onclick="showPage('blog')">THE LETTERS</a>
  <a href="#" onclick="showPage('archive-bella')">BELLISSIMA</a>
  <a href="#" onclick="showPage('archive-nasa')">NASA</a>
</div>

<div id="shell">

<!-- HOME -->
<div id="page-home" class="page active">
  <div id="home-dashboard">

    <div id="home-main">
      <div id="intro-strip">
        <div id="intro-text">loading...</div>
      </div>

      <div id="latest-strip">
        <div id="latest-title">—</div>
        <div id="latest-snip"></div>
      </div>

      <div id="bella-strip">
        <div id="bella-title-d"></div>
        <div id="bella-text-d"></div>
      </div>

      <div id="apod-win"></div>
    </div>

    <div id="home-sidebar">
      <div class="sb-sec">
        <div class="sb-head">EARTH — NASA EPIC</div>
        <img src="https://epic.gsfc.nasa.gov/archive/natural/2023/01/01/jpg/epic_1b_20230101000000.jpg">
      </div>

      <div class="sb-sec">
        <div class="sb-head">MARS — CURIOSITY</div>
        <img src="https://mars.nasa.gov/system/resources/detail_files/25043_PIA23764-16.jpg">
      </div>
    </div>

  </div>
</div>

<!-- BLOG -->
<div id="page-blog" class="page scrollable">
  <div class="section-head">THE LETTERS</div>

  <div class="blog-post">
    <div class="post-title">First Letter</div>
    <div class="post-body">
      <p>This is where your writing goes — now readable but still retro.</p>
    </div>
  </div>
</div>

<!-- ARCHIVES placeholders -->
<div id="page-archive-bella" class="page scrollable">
  <div class="section-head">BELLISSIMA ARCHIVE</div>
</div>

<div id="page-archive-nasa" class="page scrollable">
  <div class="section-head">NASA ARCHIVE</div>
</div>

</div>

<script>
function showPage(n){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
}

function closeLB(){
  document.getElementById('lightbox').classList.remove('open');
}
</script>

</body>
</html>
