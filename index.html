    apiKey: "AIzaSyAxFfLgoXqHh6vkS788YCK0HmV5JuDlrEo", // Get this from 'Your apps' in Firebase Project Settings
    authDomain: "kosmoso.firebaseapp.com",
    databaseURL: "https://kosmoso-default-rtdb.firebaseio.com",
    projectId: "kosmoso",
    storageBucket: "kosmoso.appspot.com",
    messagingSenderId: "907090872412",
    appId: "1:907090872412:web:e8f4d4044c3a2726cafe99" // Get this from 'Your apps' in Firebase Project Settings

  const app = initializeApp(firebaseConfig);

  // --- Core Utilities ---
  function get(k,fb){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}}
  function setLocal(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

  // --- Dynamic Physics Fact (Infinite Search Mechanism) ---
  async function fetchDailyPhysicsFact() {
    const today = new Date().toISOString().slice(0, 10);
    const cached = get('cosmoso_auto_bella', null);
    
    if (cached && cached.date === today) {
      renderAutoBella(cached);
      return;
    }

    try {
      // Step 1: Search the "Physics" category for 50 random members
      const categoryUrl = "https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&list=categorymembers&cmtitle=Category:Physics&cmlimit=50";
      const catRes = await fetch(categoryUrl);
      const catData = await catRes.json();
      const members = catData.query.categorymembers;
      
      // Step 2: Pick one random title from the search results
      const randomPage = members[Math.floor(Math.random() * members.length)];
      const topic = randomPage.title.replace(/\s+/g, '_');

      // Step 3: Fetch the Wikipedia summary for that specific topic
      const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + topic);
      const d = await res.json();
      
      const fact = {
        date: today,
        title: d.title,
        text: d.extract,
        img: d.thumbnail ? d.thumbnail.source : '',
        wiki: d.content_urls.desktop.page
      };

      setLocal('cosmoso_auto_bella', fact);
      renderAutoBella(fact);
    } catch (e) {
      console.error("Physics fetch error:", e);
    }
  }

  // --- Firebase Cloud Syncing ---
  window.saveIntro = function() {
    const val = document.getElementById('edit-intro').value.trim();
    if(!val) return;
    set(ref(db, 'siteData/intro'), val);
    flash('intro-saved', 'Saved to Cloud.');
  };

  window.saveBellissima = function() {
    const title = document.getElementById('bella-title').value.trim();
    const text = document.getElementById('bella-text').value.trim();
    if(!title || !text) return;
    const b = { title, text, date: new Date().toISOString() };
    set(ref(db, 'siteData/bellissima'), b);
    flash('bella-saved', 'Published to Cloud!');
  };

  onValue(ref(db, 'siteData/intro'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      setLocal('cosmoso_intro', data);
      renderIntro();
    }
  });

  onValue(ref(db, 'siteData/bellissima'), (snapshot) => {
    const data = snapshot.val();

      setLocal('cosmoso_bellissima', data);
      renderBellissima();
    }

</script>
