<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#f5f5f0;color:#000;font-family:"Times New Roman",serif;font-size:18px;}
a{color:#000080;text-decoration:none;}a:hover{text-decoration:underline;color:#cc0000;}

#topbar{background:#000080;color:#fff;font-family:Arial;font-size:12px;letter-spacing:1.5px;text-align:center;padding:6px 0;height:30px;}
#sitetitle{text-align:center;background:#fff;border-bottom:2px solid #000;padding:10px 0;height:80px;}
#sitetitle h1{font-size:38px;letter-spacing:8px;line-height:1;}
#nav{background:#fff;text-align:center;border-bottom:1px solid #000;padding:8px 0;height:35px;font-family:Arial;font-size:11px;}
#nav a{margin:0 12px;text-transform:uppercase;font-weight:bold;color:#000080;}
#nav a.active{color:#cc0000;text-decoration:underline;}

#shell{height:calc(100vh - 145px);position:relative;}
.page{display:none;height:100%;}
.page.active{display:flex;flex-direction:column;}
.page.scrollable{overflow-y:auto;padding:20px;max-width:1000px;margin:0 auto;}
.page.scrollable.active{display:block;}

#home-dashboard{display:grid;grid-template-columns:1fr 320px;height:100%;background:#fff;padding:20px;gap:20px;}
#home-main{overflow-y:auto;padding-right:15px;display:flex;flex-direction:column;gap:25px;}

/* Latest Letter Home Feature */
.latest-letter-preview { border-bottom: 1px solid #ccc; padding-bottom: 20px; cursor: pointer; }
.latest-letter-preview:hover h2 { color: #cc0000; }

/* Bellissima & Media */
.bella-entry{border:2px solid #000;padding:20px;background:#fffff0;display:flex;gap:20px; align-items: center;}
.bella-img{flex:0 0 200px;height:150px;object-fit:cover;border:1px solid #000;}

#apod-win{background:#000;min-height:380px;position:relative;border:1px solid #000; display: flex; align-items: center; justify-content: center;}
#apod-win img, #apod-win iframe{max-width:100%; max-height:100%; border:none;}
