<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* Increased base font-size */
html,body{height:100%;overflow:hidden;background:#fff;color:#000;font-family:"Times New Roman",Times,serif;font-size:18px;}
a{color:#000080;text-decoration:none;font-weight:bold;}
a:hover{color:#cc0000;text-decoration:underline;}

/* ── CHROME ── */
#topbar{background:#000080;color:#fff;font-family:Arial,sans-serif;font-size:12px;letter-spacing:2px;text-align:center;padding:7px 0;height:32px;}
.ldot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00cc00;margin-right:5px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}
#sitetitle{text-align:center;background:#fff;border-bottom:2px solid #000;padding:15px 0 10px;height:85px;}
#sitetitle h1{font-size:46px;letter-spacing:10px;font-weight:bold;line-height:1;}
#sitetitle .sub{font-size:13px;font-style:italic;color:#666;margin-top:4px;}
#nav{background:#fff;border-bottom:1px solid #000;display:flex;justify-content:center;align-items:center;height:40px;font-family:Arial,sans-serif;font-size:13px;letter-spacing:1px;gap:35px;}
#nav a{text-transform:uppercase;color:#000080;font-weight:bold;cursor:pointer;}
#nav a.active{color:#cc0000!important;text-decoration:underline!important;}
#nav a:hover{color:#cc0000;}

/* ── SHELL ── */
#shell{height:calc(100vh - 157px);overflow:hidden;}
.page{display:none;height:100%;}
.page.active{display:block;}
.page.scroll.active{overflow-y:auto;padding:35px 40px 70px;max-width:960px;margin:0 auto;}

/* ── HOME ── */
#home-grid{display:grid;grid-template-columns:1fr 340px;height:100%;}
/* Allow scrolling on main section and add padding */
#home-main{display:flex;flex-direction:column;overflow-y:auto;border-right:1px solid #ccc;padding:25px;}

/* Moved sections apart using margins */
#intro-bar, #latest-bar, #bella-bar, #apod-win {margin-bottom: 40px;}

/* intro bar */
#intro-bar{padding:15px 25px;background:#f0f0ff;border-left:5px solid #000080;border:1px solid #ddd;flex-shrink:0;}
.blbl{font-family:Arial,sans-serif;font-size:11px;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:#000080;margin-bottom:6px;}
#intro-text{font-size:16px;line-height:1.7;color:#333;font-style:italic;}

/* latest letter bar - Added image layout */
#latest-bar{padding:20px 25px;border:1px solid #ddd;cursor:pointer;flex-shrink:0;background:#fff;display:flex;gap:25px;align-items:flex-start;justify-content:space-between;}
#latest-bar:hover{background:#f8f8ff;}
#lat-text-wrap {flex:1;overflow:hidden;}
#lat-title{font-size:24px;font-weight:bold;color:#000080;margin-bottom:6px;}
#lat-snip{font-size:16px;color:#555;line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
#lat-img-wrap {flex: 0 0 220px; height: 140px; border: 1px solid #ccc; display: none; overflow: hidden; background: #f5f5f5;}
#lat-img-d {width: 100%; height: 100%; object-fit: cover;}

/* bellissima block */
#bella-bar{border:2px solid #000;background:#fffff0;flex-shrink:0;display:flex;flex-direction:column;}
.bella-hdr{display:flex;align-items:baseline;justify-content:space-between;padding:12px 25px 0;}
.bella-hdr-title{font-family:"Times New Roman",serif;font-size:16px;font-style:italic;font-weight:bold;}
.bella-hdr a{font-size:12px;font-style:normal;font-weight:normal;color:#000080;}
.bella-body{display:flex;flex:1;overflow:hidden;}
.bella-text{flex:1;padding:12px 25px 20px;overflow:hidden;}
#bella-title-d{font-size:24px;font-weight:bold;margin-bottom:8px;line-height:1.2;}
#bella-text-d{font-size:16px;line-height:1.65;color:#333;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;}
#bella-wiki-d{font-size:13px;font-style:italic;margin-top:8px;}
.bella-img{flex:0 0 300px;position:relative;background:#f0f0e0;border-left:1px solid #ccccaa;overflow:hidden;min-height:200px;}
.bella-img img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in;position:absolute;top:0;left:0;}
.bella-img .no-img{display:flex;align-items:center;justify-content:center;position:absolute;inset:0;font-size:14px;color:#aaa;font-style:italic;}

/* APOD big window */
#apod-win{min-height:450px;position:relative;background:#000;overflow:hidden;}
#apod-win .am{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;border:none;}
.apod-badge{position:absolute;top:15px;left:15px;background:rgba(0,0,128,0.88);color:#fff;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;font-weight:bold;z-index:3;display:none;}
#apod-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.85));padding:20px 25px 15px;color:#fff;z-index:3;display:none;pointer-events:none;}
