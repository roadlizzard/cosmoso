<div class="adm-form">
  <h3>EPIC (Earth View)</h3>
  <div class="fr">
    <label>Set Date</label>
    <input type="date" id="epic-admin-date"/>
  </div>
  <button class="retro-btn" onclick="setEpicAdmin()">LOAD DATE</button>
</div>

<div class="adm-form">
  <h3>Mars Rover Feed</h3>
  <button class="retro-btn" onclick="fetchMars()">REFRESH MARS</button>
</div>

<!-- ADD inside your NASA form -->
<div class="fr">
  <label>— OR — Upload file</label>
  <input type="file" id="nfile" accept="image/*"/>
</div>

<script type="module">

/* ADD THIS FUNCTION */
window.setEpicAdmin=function(){
  const d=document.getElementById('epic-admin-date').value;
  if(!d){alert('Select a date');return;}
  epicLoadDate(d);
};

/* UPDATED saveNASA */
window.saveNASA=function(){
  const t=document.getElementById('nt').value.trim();
  const u=document.getElementById('nu').value.trim();

  if(!t && !u && !document.getElementById('nfile').files[0]){
    alert('Provide title and image');
    return;
  }

  const fileInput=document.getElementById('nfile');

  function saveNASAData(url){
    const d={
      title:t,
      url:url,
      type:document.getElementById('ntp').value,
      credit:document.getElementById('nc').value.trim()||null,
      date:new Date().toISOString()
    };
    set(ref(db,'siteData/nasaDay'),d).then(()=>{
      push(ref(db,'archives/nasa'),d);
      flash('nasa-ok','Set.');
    });
  }

  if(fileInput && fileInput.files[0]){
    const reader=new FileReader();
    reader.onload=function(e){
      saveNASAData(e.target.result);
    };
    reader.readAsDataURL(fileInput.files[0]);
  }else{
    saveNASAData(u);
  }
};

</script>

</body>
