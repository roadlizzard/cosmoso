<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>
<style>
/* --- CORE RESET --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#f5f5f0;color:#000;font-family:"Times New Roman",Times,serif;font-size:18px;}
a{color:#000080;text-decoration:none;font-weight:bold;}a:hover{text-decoration:underline;color:#cc0000;}

/* UI STRUCTURE */
#topbar{background:#000080;color:#fff;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1.5px;text-align:center;padding:8px 0;height:32px;}
#sitetitle{text-align:center;background:#fff;border-bottom:2px solid #000;padding:15px 0;height:90px;}
#sitetitle h1{font-size:42px;letter-spacing:10px;font-weight:bold;line-height:1;margin:0;}

#nav{background:#fff;text-align:center;border-bottom:1px solid #000;display:flex;justify-content:center;align-items:center;height:50px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;}
#nav a{margin:0 15px;text-transform:uppercase;color:#000080;cursor:pointer;}
#nav a.active{color:#cc0000 !important;text-decoration:underline !important;}

#shell{height:calc(100vh - 172px);position:relative;overflow:hidden;}
.page{display:none;height:100%;}
.page.active{display:flex !important;flex-direction:column;}
.page.scrollable.active{display:block !important; overflow-y:auto; padding:30px; max-width:1100px; margin:0 auto;}

/* HOME DASHBOARD */
#home-dashboard{display:grid;grid-template-columns:1fr 340px;height:100%;background:#fff;padding:25px;gap:25px;}
#home-main{overflow-y:auto;padding-right:20px;display:flex;flex-direction:column;gap:35px;}

/* INTRO */
#intro-text{padding:25px; background:#f0f0ff; border-left:6px solid #000080; font-style:italic; line-height:1.7;}

/* BELLISSIMA (Enhanced Image Logic) */
.bella-label{font-family:Arial,sans-serif; font-size:12px; font-weight:bold; color:#000080; letter-spacing:2px; margin-bottom:10px; text-transform:uppercase;}
.bella-entry { border-bottom: 1px solid #000; border-top: 2px solid #000; padding: 30px; background: #fffff0; display: flex; gap: 30px; align-items: flex-start; margin-bottom: 25px;}
.bella-text { flex: 1; }
.bella-thumb { flex: 0 0 380px; position:relative; min-height: 250px; background: #eee; border: 1px solid #888866; box-shadow: 10px 10px 0px rgba(0,0,128,0.1); overflow:hidden;}
.bella-thumb img { width:100%; height:100%; object-fit:cover; display:block; position:absolute; top:0; left:0;}

/* SIDEBAR & ADMIN */
#home-sidebar { border-left: 1px solid #eee; background: #fafafa; overflow-y: auto; }
.sb-head { background:#000080; color:#fff; font-family:Arial; font-size:10px; font-weight:bold; padding:8px 12px; letter-spacing:1px; margin-bottom:12px; }
.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; }
.mini-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid #ddd; }
.adm-form { background:#f9f9f9; border:1px solid #ccc; padding:20px; margin-bottom:20px; }
.fr { margin-bottom: 12px; }
.fr label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 4px; font-family: Arial;}
.fr input, .fr textarea { width: 100%; padding: 10px; border: 1px solid #bbb; font-size: 15px; font-family: serif; }
.btn { background:#000080; color:#fff; border:none; padding:10px 20px; cursor:pointer; font-size:11px; font-weight:bold; font-family:Arial;}
</style>
</head>
<body>

<div id="topbar">KOSMOSO &middot; A PERSONAL RECORD OF THE UNIVERSE</div>
<div id="sitetitle"><h1>KOSMOSO</h1></div>

<div id="nav">
    <a id="nav-home" class="active" onclick="showPage('home')">HOME</a>
    <a id="nav-blog" onclick="showPage('blog')">THE LETTERS</a>
    <a id="nav-archive-bella" onclick="showPage('archive-bella')">BELLISSIMA ARCHIVE</a>
    <a id="nav-admin" onclick="showPage('admin')">DEVELOPER</a>
</div>

<div id="shell">
    <div id="page-home" class="page active">
        <div id="home-dashboard">
            <div id="home-main">
                <div id="intro-text">Establishing connection...</div>
                <div id="home-latest-preview" onclick="showPage('blog')" style="cursor:pointer; border-bottom:1px solid #eee; padding-bottom:25px;">
                    <small style="color:#999; font-family:Arial; letter-spacing:1px; text-transform:uppercase; font-size:10px;">Latest Dispatch</small>
                    <h2 id="h-lt" style="margin:8px 0; color:#000080;">—</h2>
                    <p id="h-lc" style="color:#555; font-size:17px;"></p>
                </div>
                <div id="bella-today-mount"></div>
                <div id="apod-win" style="background:#000; height:450px; position:relative;">
                    <div id="apod-display"></div>
                    <div style="position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.7); color:#fff; padding:15px; font-size:13px;">
                        <b id="apod-t"></b>
                    </div>
                </div>
            </div>
            <div id="home-sidebar">
                <div class="sb-head">MEDIA MINIBAR</div>
                <div id="mini-grid" class="mini-grid"></div>
            </div>
        </div>
    </div>

    <div id="page-blog" class="page scrollable"><div id="blog-list"></div></div>
    <div id="page-archive-bella" class="page scrollable"><div id="bella-archive-list"></div></div>
    
    <div id="page-admin" class="page scrollable">
        <div id="lock" style="text-align:center; padding-top:50px;">
            <input type="password" id="pw" placeholder="Code" style="padding:10px; border:1px solid #000;">
            <button class="btn" onclick="checkPw()">UNLOCK</button>
        </div>
        <div id="panel" style="display:none;">
            <div class="adm-form">
                <h3>Update Home Content</h3>
                <div class="fr"><label>Intro Text</label><textarea id="in-i"></textarea></div>
                <div class="fr"><label>Bellissima Title</label><input type="text" id="in-bt"></div>
                <div class="fr"><label>Bellissima Text</label><textarea id="in-bb"></textarea></div>
                <div class="fr"><label>Bellissima Image URL (Full link)</label><input type="text" id="in-bi" placeholder="https://..."></div>
                <button class="btn" onclick="window.saveBella()">Save & Push</button>
            </div>
        </div>
    </div>
</div>

<script>
function showPage(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('#nav a').forEach(a=>a.classList.remove('active'));
    document.getElementById('page-'+n).classList.add('active');
    document.getElementById('nav-'+n).classList.add('active');
}
function checkPw(){ if(document.getElementById('pw').value === 'cosmos2026'){ document.getElementById('lock').style.display='none'; document.getElementById('panel').style.display='block'; } }
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const conf = { databaseURL: "https://kosmoso-default-rtdb.firebaseio.com" };
const app = initializeApp(conf);
const db = getDatabase(app);

function makeBellaEntry(data, isToday = false) {
    if(!data) return '';
    // Ensure image URL is clean and valid
    const imgHtml = data.img && data.img.length > 5 
        ? `<div class="bella-thumb"><img src="${data.img.trim()}" crossorigin="anonymous" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Load+Error'"></div>`
        : `<div class="bella-thumb"><div style="padding:20px; text-align:center; color:#999;">No Image Provided</div></div>`;

    return `
    <div class="bella-label">Bellissima!</div>
    <div class="bella-entry">
        <div class="bella-text">
            <small style="color:#000080; font-weight:bold;">${isToday ? 'TODAY' : (data.date || '')}</small>
            <h2 style="font-size:32px; margin:10px 0;">${data.title || 'Untitled'}</h2>
            <p style="line-height:1.8;">${data.text || ''}</p>
        </div>
        ${imgHtml}
    </div>`;
}

// LISTENERS
onValue(ref(db, 'site'), (s) => {
    const d = s.val(); if(!d) return;
    document.getElementById('intro-text').textContent = d.intro || "...";
    if(d.bellaToday) document.getElementById('bella-today-mount').innerHTML = makeBellaEntry(d.bellaToday, true);
});

onValue(ref(db, 'letters'), (s) => {
    const d = s.val(); if(!d) return;
    const entries = Object.values(d).reverse();
    document.getElementById('h-lt').textContent = entries[0].title;
    document.getElementById('h-lc').textContent = entries[0].content.substring(0, 150) + "...";
});

// ADMIN
window.saveBella = () => {
    const b = { 
        title: document.getElementById('in-bt').value, 
        text: document.getElementById('in-bb').value, 
        img: document.getElementById('in-bi').value.trim(), 
        date: new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}) 
    };
    set(ref(db, 'site/intro'), document.getElementById('in-i').value);
    set(ref(db, 'site/bellaToday'), b);
    push(ref(db, 'bellaArchive'), b);
    alert("Updated Successfully");
};
</script>
</body>
</html>
