<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#f5f5f0;color:#000;font-family:"Times New Roman",serif;font-size:18px;}
a{color:#000080;text-decoration:none;font-weight:bold;}a:hover{text-decoration:underline;color:#cc0000;}

#topbar{background:#000080;color:#fff;font-family:Arial;font-size:12px;letter-spacing:1.5px;text-align:center;padding:6px 0;height:30px;}
#sitetitle{text-align:center;background:#fff;border-bottom:2px solid #000;padding:10px 0;height:80px;}
#sitetitle h1{font-size:38px;letter-spacing:8px;line-height:1;}
#nav{background:#fff;text-align:center;border-bottom:1px solid #000;padding:8px 0;height:35px;font-family:Arial;font-size:11px;}
#nav a{margin:0 12px;text-transform:uppercase;color:#000080;cursor:pointer;}
#nav a.active{color:#cc0000;text-decoration:underline;}

#shell{height:calc(100vh - 145px);position:relative;}
.page{display:none;height:100%;}
.page.active{display:flex;flex-direction:column;}
.page.scrollable{overflow-y:auto;padding:20px;max-width:1000px;margin:0 auto;}
.page.scrollable.active{display:block;}

#home-dashboard{display:grid;grid-template-columns:1fr 320px;height:100%;background:#fff;padding:20px;gap:20px;}
#home-main{overflow-y:auto;padding-right:15px;display:flex;flex-direction:column;gap:25px;}

/* --- BELLISSIMA STYLE --- */
.bella-entry { border-bottom: 1px solid #000; border-top: 2px solid #000; padding: 25px; background: #fffff0; margin-bottom: 30px; display: flex; gap: 30px; align-items: flex-start; }
.bella-text { flex: 1; }
.bella-thumb { flex: 0 0 350px; padding: 10px; background: #fffff0; border: 1px solid #886; box-shadow: 6px 6px 0px rgba(0,0,128,0.1); }
.bella-thumb img { width: 100%; display: block; border: 1px solid #cca; }

/* Image of Day & Minibar */
#apod-win { background:#000; min-height:400px; position:relative; border:1px solid #000; overflow:hidden; }
#apod-win img, #apod-win iframe { width:100%; height:400px; object-fit:cover; border:none; }
.apod-info { position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.7); color:#fff; padding:12px; font-family:Arial; font-size:13px; }

.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 10px; }
.mini-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid #ccc; }

/* Admin */
.adm-form { background:#f9f9f9; border:1px solid #ccc; padding:20px; margin-bottom:20px; }
.fr { margin-bottom: 15px; }
.fr label { display: block; font-size: 11px; font-family: Arial; font-weight: bold; margin-bottom: 4px; }
.fr input, .fr textarea, .fr select { width: 100%; padding: 10px; border: 1px solid #bbb; font-size: 16px; }
.btn { background:#000080; color:#fff; border:none; padding:12px 20px; cursor:pointer; font-family:Arial; font-size:12px; font-weight:bold; }
</style>
</head>
<body>

<div id="topbar">KOSMOSO &middot; A PERSONAL RECORD OF THE UNIVERSE</div>
<div id="sitetitle"><h1>KOSMOSO</h1></div>
<div id="nav">
    <a id="nav-home" class="active" onclick="showPage('home')">HOME</a>
    <a id="nav-blog" onclick="showPage('blog')">THE LETTERS</a>
    <a id="nav-archive-bella" onclick="showPage('archive-bella')">BELLISSIMA ARCHIVE</a>
    <a id="nav-admin" onclick="showPage('admin')">EDIT</a>
</div>

<div id="shell">
    <div id="page-home" class="page active">
        <div id="home-dashboard">
            <div id="home-main">
                <div id="intro-text" style="padding:20px; background:#f0f0ff; border-left:5px solid #000080; font-style:italic;">Initializing...</div>
                
                <div id="home-latest-letter" onclick="showPage('blog')" style="cursor:pointer; border-bottom:1px solid #eee; padding-bottom:15px;">
                    <small style="color:#999; font-family:Arial;">LATEST DISPATCH</small>
                    <h2 id="h-lt">—</h2>
                    <p id="h-lc" style="color:#555; font-size:16px;"></p>
                </div>

                <div id="bella-today"></div>

                <div id="apod-win">
                    <div id="apod-display"></div>
                    <div class="apod-info"><b id="apod-t"></b> &nbsp; <span id="apod-c" style="opacity:0.8;"></span></div>
                </div>
            </div>

            <div id="home-sidebar" style="border-left:1px solid #eee; background:#fafafa;">
                <div style="background:#000080; color:#fff; font-family:Arial; font-size:10px; padding:5px 10px;">MEDIA MINIBAR</div>
                <div id="mini-grid" class="mini-grid"></div>
                <div style="background:#000080; color:#fff; font-family:Arial; font-size:10px; padding:5px 10px; margin-top:20px;">NASA EPIC</div>
                <img id="epic-img" style="width:100%;" src=""/>
            </div>
        </div>
    </div>

    <div id="page-blog" class="page scrollable">
        <h2 style="letter-spacing:1px; border-bottom:2px solid #000;">THE LETTERS</h2><br>
        <div id="blog-list"></div>
    </div>

    <div id="page-archive-bella" class="page scrollable">
        <h2 style="letter-spacing:1px; border-bottom:2px solid #000;">BELLISSIMA ARCHIVE</h2><br>
        <div id="bella-archive-list"></div>
    </div>

    <div id="page-admin" class="page scrollable">
        <div id="lock" style="text-align:center; padding-top:80px;">
            <input type="password" id="pw" placeholder="Developer Password" style="padding:12px; width:250px; border:1px solid #000;">
            <button class="btn" onclick="checkPw()">UNLOCK</button>
        </div>
        <div id="panel" style="display:none;">
            <div class="adm-form">
                <h3>Main Metadata & Bellissima!</h3>
                <div class="fr"><label>Global Intro</label><textarea id="in-i" rows="2"></textarea></div>
                <div class="fr"><label>Fact Title</label><input type="text" id="in-bt"></div>
                <div class="fr"><label>Fact Body</label><textarea id="in-bb" rows="3"></textarea></div>
                <div class="fr"><label>Fact Image URL</label><input type="text" id="in-bi"></div>
                <button class="btn" onclick="saveBella()">Update & Archive Fact</button>
            </div>
            <div class="adm-form">
                <h3>Image of the Day</h3>
                <div class="fr"><label>Title</label><input type="text" id="in-nt"></div>
                <div class="fr"><label>Media URL</label><input type="text" id="in-nu"></div>
                <div class="fr"><label>Is Video?</label><select id="in-nv"><option value="false">Image</option><option value="true">Video</option></select></div>
                <button class="btn" onclick="saveAPOD()">Set APOD</button>
            </div>
            <div class="adm-form">
                <h3>New Dispatch & Minibar</h3>
                <div class="fr"><label>Letter Title</label><input type="text" id="in-lt"></div>
                <div class="fr"><label>Letter Content</label><textarea id="in-lc" rows="5"></textarea></div>
                <div class="fr"><label>Minibar Image URL (Add new)</label><input type="text" id="in-mu"></div>
                <button class="btn" onclick="saveAll()">Publish All</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const conf = { databaseURL: "https://kosmoso-default-rtdb.firebaseio.com" };
const app = initializeApp(conf);
const db = getDatabase(app);

window.showPage = (n) => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('#nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('page-'+n).classList.add('active');
    document.getElementById('nav-'+n).classList.add('active');
    window.scrollTo(0,0);
};

function buildBellaHTML(data, isToday = false) {
    return `<div class="bella-entry">
        <div class="bella-text">
            <small style="font-family:Arial; color:#000080;">${isToday ? 'TODAY' : data.date}</small>
            <h2 style="margin:5px 0;">${data.title}</h2>
            <p style="line-height:1.6;">${data.text}</p>
        </div>
        ${data.img ? `<div class="bella-thumb"><img src="${data.img}"></div>` : ''}
    </div>`;
}

// Data Sync
onValue(ref(db, 'site'), (s) => {
    const d = s.val(); if(!d) return;
    document.getElementById('intro-text').textContent = d.intro || "";
    if(d.bellaToday) document.getElementById('bella-today').innerHTML = buildBellaHTML(d.bellaToday, true);
    if(d.apod) {
        document.getElementById('apod-t').textContent = d.apod.title;
        document.getElementById('apod-display').innerHTML = d.apod.isVideo === "true" 
            ? `<iframe src="${d.apod.url}"></iframe>` : `<img src="${d.apod.url}">`;
    }
});

onValue(ref(db, 'letters'), (s) => {
    const d = s.val(); const list = document.getElementById('blog-list'); list.innerHTML = '';
    if(d) {
        const entries = Object.values(d).reverse();
        document.getElementById('h-lt').textContent = entries[0].title;
        document.getElementById('h-lc').textContent = entries[0].content.substring(0, 150) + "...";
        entries.forEach(l => list.innerHTML += `<div style="margin-bottom:30px;"><h3>${l.title}</h3><p style="white-space:pre-wrap;">${l.content}</p><small>${l.date}</small></div><hr>`);
    }
});

onValue(ref(db, 'bellaArchive'), (s) => {
    const d = s.val(); const list = document.getElementById('bella-archive-list'); list.innerHTML = '';
    if(d) Object.values(d).reverse().forEach(b => list.innerHTML += buildBellaHTML(b));
});

onValue(ref(db, 'minibar'), (s) => {
    const grid = document.getElementById('mini-grid'); grid.innerHTML = '';
    if(s.val()) Object.values(s.val()).reverse().slice(0, 6).forEach(url => grid.innerHTML += `<img src="${url}">`);
});

// Admin
window.checkPw = () => { if(document.getElementById('pw').value === 'cosmos2026') { document.getElementById('lock').style.display='none'; document.getElementById('panel').style.display='block'; } };

window.saveBella = () => {
    const b = { title: document.getElementById('in-bt').value, text: document.getElementById('in-bb').value, img: document.getElementById('in-bi').value, date: new Date().toLocaleDateString() };
    set(ref(db, 'site/intro'), document.getElementById('in-i').value);
    set(ref(db, 'site/bellaToday'), b);
    push(ref(db, 'bellaArchive'), b);
    alert("Bellissima Updated");
};

window.saveAPOD = () => {
    set(ref(db, 'site/apod'), { title: document.getElementById('in-nt').value, url: document.getElementById('in-nu').value, isVideo: document.getElementById('in-nv').value });
    alert("APOD Updated");
};

window.saveAll = () => {
    const lt = document.getElementById('in-lt').value;
    const mu = document.getElementById('in-mu').value;
    if(lt) push(ref(db, 'letters'), { title: lt, content: document.getElementById('in-lc').value, date: new Date().toLocaleDateString() });
    if(mu) push(ref(db, 'minibar'), mu);
    alert("Published");
};

fetch('https://epic.gsfc.nasa.gov/api/natural').then(r=>r.json()).then(d=>{
    const item = d[0]; const date = item.date.split(' ')[0].replaceAll('-','/');
    document.getElementById('epic-img').src = `https://epic.gsfc.nasa.gov/archive/natural/${date}/png/${item.image}.png`;
});
</script>
</body>
</html>
