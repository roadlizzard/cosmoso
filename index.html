<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>
<style>
/* --- CORE STYLING --- */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:#f5f5f0;color:#000;font-family:"Times New Roman",Times,serif;font-size:18px;}
a{color:#000080;text-decoration:none;font-weight:bold;}a:hover{text-decoration:underline;color:#cc0000;}

#topbar{background:#000080;color:#fff;font-family:Arial,sans-serif;font-size:12px;letter-spacing:1.5px;text-align:center;padding:6px 0;height:30px;}
#sitetitle{text-align:center;background:#fff;border-bottom:2px solid #000;padding:12px 0;height:85px;}
#sitetitle h1{font-size:42px;letter-spacing:10px;font-weight:bold;line-height:1;margin:0;}

#nav{background:#fff;text-align:center;border-bottom:1px solid #000;padding:10px 0;height:40px;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1px;}
#nav a{margin:0 15px;text-transform:uppercase;color:#000080;cursor:pointer;}
#nav a.active{color:#cc0000;text-decoration:underline;}

#shell{height:calc(100vh - 155px);position:relative;}
.page{display:none;height:100%;}
.page.active{display:flex;flex-direction:column;}
.page.scrollable{overflow-y:auto;padding:30px;max-width:1100px;margin:0 auto;}
.page.scrollable.active{display:block;}

/* --- HOME DASHBOARD --- */
#home-dashboard{display:grid;grid-template-columns:1fr 340px;height:100%;background:#fff;padding:25px;gap:25px;}
#home-main{overflow-y:auto;padding-right:20px;display:flex;flex-direction:column;gap:30px;}

/* Bellissima Component (Original Virtuoso Design) */
.bella-entry { border-bottom: 1px solid #000; border-top: 2px solid #000; padding: 25px; background: #fffff0; display: flex; gap: 30px; align-items: flex-start; margin-bottom: 20px;}
.bella-text { flex: 1; }
.bella-thumb { flex: 0 0 380px; padding: 10px; background: #fffff0; border: 1px solid #888866; box-shadow: 8px 8px 0px rgba(0,0,128,0.1); }
.bella-thumb img { width: 100%; display: block; border: 1px solid #ccccaa; height: auto; }

/* Image of Day (APOD) */
#apod-win { background:#000; min-height:450px; position:relative; border:1px solid #000; overflow:hidden; display: flex; align-items: center; justify-content: center; }
#apod-display { width: 100%; height: 100%; }
#apod-display img { width:100%; height:450px; object-fit:cover; display:block; border:none; }
#apod-display iframe { width:100%; height:450px; border:none; display:block; }
.apod-info { position:absolute; bottom:0; width:100%; background:rgba(0,0,0,0.75); color:#fff; padding:15px; font-family:Arial,sans-serif; font-size:13px; }

/* Sidebar & Minibar */
#home-sidebar { border-left: 1px solid #eee; background: #fafafa; overflow-y: auto; }
.sb-head { background:#000080; color:#fff; font-family:Arial; font-size:10px; font-weight:bold; padding:6px 12px; letter-spacing:1px; margin-bottom:10px; }
.mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; padding: 10px; }
.mini-grid img { width: 100%; aspect-ratio: 1; object-fit: cover; border: 1px solid #ddd; cursor: pointer; transition: transform 0.2s; }
.mini-grid img:hover { transform: scale(1.05); }

/* Developer Panel */
.adm-form { background:#f9f9f9; border:1px solid #ccc; padding:25px; margin-bottom:25px; }
.fr { margin-bottom: 15px; }
.fr label { display: block; font-size: 11px; font-family: Arial; font-weight: bold; margin-bottom: 5px; color:#333; }
.fr input, .fr textarea, .fr select { width: 100%; padding: 12px; border: 1px solid #bbb; font-size: 16px; font-family: serif; }
.btn { background:#000080; color:#fff; border:none; padding:12px 25px; cursor:pointer; font-family:Arial; font-size:12px; font-weight:bold; }
.btn:hover { background:#cc0000; }
</style>
</head>
<body>

<div id="topbar">KOSMOSO &middot; A PERSONAL RECORD OF THE UNIVERSE</div>
<div id="sitetitle"><h1>KOSMOSO</h1></div>

<div id="nav">
    <a id="nav-home" class="active" onclick="showPage('home')">HOME</a>
    <a id="nav-blog" onclick="showPage('blog')">THE LETTERS</a>
    <a id="nav-archive-bella" onclick="showPage('archive-bella')">BELLISSIMA ARCHIVE</a>
    <a id="nav-admin" onclick="showPage('admin')">DEVELOPER</a>
</div>

<div id="shell">
    
    <div id="page-home" class="page active">
        <div id="home-dashboard">
            <div id="home-main">
                <div id="intro-text" style="padding:20px; background:#f0f0ff; border-left:5px solid #000080; font-style:italic; line-height:1.6;">Loading stream...</div>
                
                <div id="home-latest-preview" onclick="showPage('blog')" style="cursor:pointer; border-bottom:1px solid #eee; padding-bottom:20px;">
                    <small style="color:#999; font-family:Arial; letter-spacing:1px; text-transform:uppercase; font-size:10px;">Latest Dispatch</small>
                    <h2 id="h-lt" style="margin:5px 0; color:#000080;">—</h2>
                    <p id="h-lc" style="color:#555; font-size:17px; line-height:1.5;"></p>
                </div>

                <div id="bella-today-mount"></div>

                <div id="apod-win">
                    <div id="apod-display"></div>
                    <div class="apod-info">
                        <b id="apod-t" style="font-size:15px; letter-spacing:1px;"></b><br>
                        <span id="apod-c" style="opacity:0.8;"></span>
                    </div>
                </div>
            </div>

            <div id="home-sidebar">
                <div class="sb-head">MEDIA MINIBAR</div>
                <div id="mini-grid" class="mini-grid"></div>
