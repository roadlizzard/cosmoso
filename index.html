<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KOSMOSO</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:#f5f5f0;color:#000;font-family:"Times New Roman",Times,serif;font-size:18px;}
a{color:#000080;text-decoration:none;font-weight:bold;}a:hover{text-decoration:underline;color:#cc0000;}

#topbar{background:#000080;color:#fff;font-family:Arial,sans-serif;font-size:12px;letter-spacing:1.5px;text-align:center;padding:6px 0;height:30px;}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00cc00;margin-right:4px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

#sitetitle{text-align:center;background:#fff;border-bottom:2px solid #000;padding:10px 0 6px;height:75px;}
#sitetitle h1{font-size:38px;letter-spacing:8px;font-weight:bold;line-height:1;}
#sitetitle .tagline{font-size:13px;font-style:italic;color:#555;}

#nav{background:#fff;text-align:center;border-bottom:1px solid #000;padding:8px 0;height:34px;font-family:Arial,sans-serif;font-size:12px;letter-spacing:1px;}
#nav a{margin:0 12px;color:#000080;text-transform:uppercase;}
#nav a:hover, #nav a.active{color:#cc0000;text-decoration:underline;}

#shell{height:calc(100vh - 139px);position:relative;}
.page{display:none;height:100%;}
.page.active{display:flex;flex-direction:column;}
.page.scrollable{overflow-y:auto;padding:20px 24px 50px;max-width:1000px;margin:0 auto;}
.page.scrollable.active{display:block;}

#home-dashboard{display:grid;grid-template-columns:1fr 320px;height:100%;background:#fff;gap:20px;padding:20px;}
#home-main{display:grid;grid-template-rows:auto auto auto 1fr;border-right:1px solid #ccc;overflow-y:auto;padding-right:15px;gap:20px;}

/* --- BELLISSIMA UNIFIED STYLE --- */
.bella-entry { border-bottom: 1px solid #000; border-top: 2px solid #000; padding: 25px; background: #fffff0; margin-bottom: 30px; }
.bella-content-wrapper { display: flex; gap: 30px; align-items: flex-start; }
.bella-text-column { flex: 1; }
.bella-thumb-wrap { flex: 0 0 450px; }
.bella-thumb-inner { padding: 10px; background: #fffff0; border: 1px solid #888866; box-shadow: 6px 6px 0px rgba(0,0,128,0.1); }
.bella-thumb-img { width: 100%; height: auto; display: block; border: 1px solid #ccccaa; }
.bella-head { font-family: "Times New Roman", serif; font-size: 16px; font-style: italic; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); padding-bottom: 5px;}

/* Grid for Letters */
.cube-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; margin-top: 20px; }
.content-cube { border: 1px solid #ccc; background: #fffff0; aspect-ratio: 1 / 1; position: relative; overflow: hidden; }
.cube-inner { position: absolute; top: 0; left: 0; right: 0; bottom: 0; padding: 18px; overflow-y: auto; scrollbar-width: none; }

/* Sidebar */
#home-sidebar{display:flex;flex-direction:column;overflow-y:auto;background:#fafafa;gap:20px;padding-right:10px;}
.sb-head{background:#000080;color:#fff;font-family:Arial,sans-serif;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:6px 10px;font-weight:bold;}

/* Admin / Developer Styles */
.adm-form{border:1px solid #ccc;padding:20px;margin-bottom:24px;background:#fafafa;}
.retro-btn{background:#000080;color:#fff;border:2px outset #8888cc;padding:8px 16px;cursor:pointer;font-weight:bold;font-family:Arial;font-size:12px;}
.fr { margin-bottom: 12px; }
.fr label { display: block; font-size: 12px; font-family: Arial; font-weight: bold; margin-bottom: 4px; }
.fr input, .fr textarea { width: 100%; padding: 8px; border: 1px solid #ccc; font-family: serif; font-size: 16px;}
#admin-lock-wrap { text-align: center; padding: 100px 20px; }
</style>
</head>
<body>

<div id="topbar"><span class="live-dot"></span>KOSMOSO &nbsp;&middot;&nbsp; A PERSONAL RECORD OF THE UNIVERSE</div>

<div id="sitetitle">
  <h1>KOSMOSO</h1>
  <div class="tagline">a personal record of the universe</div>
</div>

<div id="nav">
  <a href="#" class="active" id="nav-home" onclick="showPage('home');return false;">HOME</a>
  <a href="#" id="nav-blog" onclick="showPage('blog');return false;">THE LETTERS</a>
  <a href="#" id="nav-archive-bella" onclick="showPage('archive-bella');return false;">BELLISSIMA ARCHIVE</a>
  <a href="#" id="nav-admin" onclick="showPage('admin');return false;">EDIT</a>
</div>

<div id="shell">

  <div id="page-home" class="page active">
    <div id="home-dashboard">
      <div id="home-main">
        <div id="intro-strip" style="background:#f0f0ff; border-left:4px solid #000080; padding:15px 20px;">
          <div id="intro-text">loading...</div>
        </div>
        
        <div id="latest-strip" onclick="showPage('blog')" style="cursor:pointer; border-bottom: 1px solid #ccc; padding: 15px 20px;">
          <div style="font-family:Arial; font-size:11px; text-transform:uppercase; color:#555;">Latest Letter</div>
          <div id="latest-title" style="font-size:22px; font-weight:bold; color:#000080;">—</div>
          <div id="latest-snip" style="color:#444; font-size:16px; margin-top:5px;"></div>
        </div>

        <div id="bella-today-container"></div>
      </div>

      <div id="home-sidebar">
        <div class="sb-sec">
          <div class="sb-head">EARTH — NASA EPIC</div>
          <img id="epic-img" style="width:100%; display:block;" />
        </div>
      </div>
    </div>
  </div>

  <div id="page-blog" class="page scrollable">
    <div class="section-head" style="font-family:Arial; font-weight:bold; border-bottom:2px solid #000; margin-bottom:20px;">THE LETTERS</div>
    <div id="blog-list" class="cube-grid"></div>
  </div>

  <div id="page-archive-bella" class="page scrollable">
    <div class="section-head" style="font-family:Arial; font-weight:bold; border-bottom:2px solid #000; margin-bottom:20px;">BELLISSIMA ARCHIVE</div>
    <div id="bella-archive-list"></div>
  </div>

  <div id="page-admin" class="page scrollable">
    <div id="admin-lock-wrap">
      <p style="margin-bottom:15px;">ENTER DEVELOPER PASSWORD</p>
      <input type="password" id="pw-input" onkeydown="if(event.key==='Enter')checkPw()" style="padding:10px; border:1px solid #000;"/>
      <button class="retro-btn" onclick="checkPw()">UNLOCK</button>
    </div>

    <div id="admin-panel" style="display:none;">
      <div class="adm-form">
        <h3>Intro & Bellissima!</h3>
        <div class="fr"><label>Global Introduction</label><textarea id="edit-intro" rows="3"></textarea></div>
        <div class="fr"><label>Fact Title</label><input type="text" id="bt"/></div>
        <div class="fr"><label>Fact Text</label><textarea id="bb" rows="4"></textarea></div>
        <div class="fr"><label>Image URL</label><input type="url" id="bi"/></div>
        <div class="fr"><label>Wiki Link</label><input type="url" id="bw"/></div>
        <button class="retro-btn" onclick="saveBella()">PUBLISH FACT & INTRO</button>
      </div>

      <div class="adm-form">
        <h3>New Letter</h3>
        <div class="fr"><label>Title</label><input type="text" id="lt"/></div>
        <div class="fr"><label>Content</label><textarea id="lb" rows="6"></textarea></div>
        <button class="retro-btn" onclick="pubLetter()">PUBLISH LETTER</button>
      </div>
    </div>
  </div>

</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import{getDatabase,ref,set,push,onValue}from"https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig={apiKey:"AIzaSyAxFfLgoXqHh6vkS788YCK0HmV5JuDlrEo",authDomain:"kosmoso.firebaseapp.com",databaseURL:"https://kosmoso-default-rtdb.firebaseio.com",projectId:"kosmoso",storageBucket:"kosmoso.firebasestorage.app",messagingSenderId:"907090872412",appId:"1:907090872412:web:e8f4d4044c3a2726cafe99"};
const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

window.showPage=function(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('#nav a').forEach(a=>a.classList.remove('active'));
    document.getElementById('page-'+n).classList.add('active');
    document.getElementById('nav-'+n).classList.add('active');
};

function createBellaHTML(data, isToday = false) {
    if (!data) return '';
    const dateStr = data.date ? new Date(data.date).toLocaleDateString('en-GB', {day:'numeric', month:'short', year:'numeric'}) : '';
    return `
        <div class="bella-entry">
            <div class="bella-head">
                <span>bellissima! &mdash; ${isToday ? "today's fact" : "archived fact"}</span>
                <span style="font-family:Arial; font-size:11px; color:#888;">${dateStr}</span>
            </div>
            <div class="bella-content-wrapper">
                <div class="bella-text-column">
                    <div style="font-size:24px; font-weight:bold; color:#000080; margin-bottom:10px;">${data.title}</div>
                    <div style="font-size:18px; line-height:1.7;">${data.text}</div>
                    ${data.wiki ? `<div style="font-size:14px; font-style:italic; margin-top:15px;">&rarr; <a href="${data.wiki}" target="_blank">Full Wikipedia Entry</a></div>` : ''}
                </div>
                ${data.img ? `
                <div class="bella-thumb-wrap">
                    <div class="bella-thumb-inner">
                        <img src="${data.img}" class="bella-thumb-img" />
                    </div>
                </div>` : ''}
            </div>
        </div>`;
}

// Syncing Site Data
onValue(ref(db,'siteData/intro'), s => { 
  const val = s.val() || "";
  document.getElementById('intro-text').textContent = val; 
  document.getElementById('edit-intro').value = val;
});

onValue(ref(db,'siteData/bellissima'), s => {
    document.getElementById('bella-today-container').innerHTML = createBellaHTML(s.val(), true);
});

onValue(ref(db,'archives/bellissima'), s => {
    const d = s.val();
    if (!d) return;
    const sorted = Object.values(d).sort((a,b) => (b.date || "").localeCompare(a.date || ""));
    document.getElementById('bella-archive-list').innerHTML = sorted.map(item => createBellaHTML(item, false)).join('');
});

onValue(ref(db,'siteData/letters'), s => {
    const d = s.val();
    const container = document.getElementById('blog-list');
    if(!d) return;
    const entries = Object.entries(d).sort((a,b) => b[1].date.localeCompare(a[1].date));
    
    // Update Latest Letter on Home
    const latest = entries[0][1];
    document.getElementById('latest-title').textContent = latest.title;
    document.getElementById('latest-snip').textContent = latest.content.slice(0, 150) + "...";

    container.innerHTML = entries.map(([k, p]) => `
        <article class="content-cube">
            <div class="cube-inner">
                <span style="font-family:Arial; font-size:11px; color:#888;">${new Date(p.date).toLocaleDateString('en-GB')}</span>
                <div style="font-weight:bold; margin: 5px 0;">${p.title}</div>
                <div style="font-size:14px;">${p.content.slice(0, 100)}...</div>
            </div>
        </article>
    `).join('');
});

// Admin Panel Logic
window.checkPw = () => {
    if(document.getElementById('pw-input').value === 'cosmos2026') {
        document.getElementById('admin-lock-wrap').style.display='none';
        document.getElementById('admin-panel').style.display='block';
    } else {
        alert("Incorrect Password");
    }
};

window.saveBella = function() {
    const b = { 
      title: document.getElementById('bt').value, 
      text: document.getElementById('bb').value, 
      img: document.getElementById('bi').value, 
      wiki: document.getElementById('bw').value, 
      date: new Date().toISOString() 
    };
    set(ref(db, 'siteData/intro'), document.getElementById('edit-intro').value);
    set(ref(db, 'siteData/bellissima'), b).then(() => push(ref(db, 'archives/bellissima'), b));
    alert("Updated Fact and Intro.");
};

window.pubLetter = () => {
    push(ref(db, 'siteData/letters'), { 
      title: document.getElementById('lt').value, 
      content: document.getElementById('lb').value, 
      date: new Date().toISOString() 
    }).then(() => {
      document.getElementById('lt').value = "";
      document.getElementById('lb').value = "";
      alert("Letter Published.");
    });
};

// NASA EPIC fetch for sidebar
fetch('https://epic.gsfc.nasa.gov/api/natural').then(r=>r.json()).then(d=>{
    const item = d[0];
    const date = item.date.split(' ')[0].replaceAll('-','/');
    document.getElementById('epic-img').src = `https://epic.gsfc.nasa.gov/archive/natural/${date}/png/${item.image}.png`;
});
</script>
</body>
</html>
