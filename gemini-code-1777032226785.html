<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COSMOSO</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  // PASTE YOUR SETTINGS FROM FIREBASE PROJECT SETTINGS HERE
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "kosmoso.firebaseapp.com",
    databaseURL: "https://kosmoso-default-rtdb.firebaseio.com",
    projectId: "kosmoso",
    storageBucket: "kosmoso.appspot.com",
    messagingSenderId: "907090872412",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.db = db;
  window.dbRefs = { ref, set, onValue, push };
</script>

<script>
/* --- THE CLOUD BRAIN LOGIC --- */

// 1. This handles your Introduction
function saveIntro() {
  const text = document.getElementById('edit-intro-text').value;
  const { ref, set } = window.dbRefs;
  set(ref(window.db, 'siteData/intro'), text).then(() => {
    alert("Intro updated globally!");
  });
}

// 2. This handles your Letters (Blog)
function publishLetter() {
  const title = document.getElementById('letter-title').value.trim();
  const content = document.getElementById('letter-content').value.trim();
  if(!title || !content) return;

  const { ref, push } = window.dbRefs;
  push(ref(window.db, 'siteData/letters'), {
    title: title,
    content: content,
    date: new Date().toLocaleDateString()
  });
  alert("Published to cloud!");
}

// 3. This handles your Background Images
function setBgImages(imgs) {
  const { ref, set } = window.dbRefs;
  set(ref(window.db, 'siteData/bgImages'), imgs);
}

// 4. This keeps the site synced in real-time
function initCloudSync() {
  const { ref, onValue } = window.dbRefs;

  // Sync Intro
  onValue(ref(window.db, 'siteData/intro'), (snap) => {
    const val = snap.val();
    if(val) {
      document.getElementById('intro-text').innerHTML = `<p>${val}</p>`;
      document.getElementById('edit-intro-text').value = val;
    }
  });

  // Sync Letters
  onValue(ref(window.db, 'siteData/letters'), (snap) => {
    const data = snap.val();
    const container = document.getElementById('blog-entries-list');
    if(!data) return;
    container.innerHTML = '';
    Object.values(data).reverse().forEach(post => {
      container.innerHTML += `<h3>${post.title}</h3><p>${post.content}</p><hr>`;
    });
  });

  // Sync Backgrounds
  onValue(ref(window.db, 'siteData/bgImages'), (snap) => {
    const imgs = snap.val() || [];
    window._localBgImages = imgs; // Update the local variable
    renderBgImages(); // Re-draw the ghosts
  });
}

window.onload = function() {
  initCloudSync();
  // ... run your NASA, EPIC, and Mars functions here
};
</script>
</body>
</html>
